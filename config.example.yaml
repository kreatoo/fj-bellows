# fj-bellows configuration (example).
#
# Copy to config.yaml, fill in the two `<…>` secrets, and run. This file is
# a working bootstrap; the deep reference for each block lives in the
# package README it points at:
#
#   forgejo:        internal/forgejo/README.md
#   orchestrator:   internal/orchestrator/README.md
#   provider:linode internal/provider/linode/README.md
#   provider:docker internal/provider/docker/README.md
#
# config.yaml holds secrets directly — keep it `chmod 600`. The SSH key is
# referenced by path (not inlined).

forgejo:
  # Base URL of your Forgejo instance. Workers reach this URL through a
  # reverse port-forward on the dispatch SSH session — a LAN-internal
  # hostname works out of the box.
  url: https://forgejo.example.com

  # Forgejo admin token (all scopes). Polls the job queue and mints per-job
  # ephemeral runner registrations.
  token: <forgejo-admin-token>

  # API path segment that owns the runners: "orgs/<org>" or "repos/<owner>/<name>".
  scope: orgs/example

  # Runner labels this pool services. The `<name>:<scheme>://<image>` form
  # binds a label to a job-container image; the orchestrator strips the
  # binding for queue matching and passes the full form to one-job. The
  # catthehacker image is the de-facto default for GH-Actions-style workflows.
  labels:
    - 'ubuntu-latest:docker://catthehacker/ubuntu:act-latest'

# Tag stamped on every instance this deployment owns. SET A UNIQUE TAG per
# deployment if multiple fj-bellows run against the same cloud account, or
# they will destroy each other's VMs. (The default "fj-bellows" warns at
# startup.)
tag: fj-bellows

scale:
  # Maximum number of warm worker VMs.
  max: 1

# Selected in-tree provider.
provider: linode

# Provider-specific config — decoded by the selected provider above.
#
# === Linode ===
# Full reference: internal/provider/linode/README.md
# PAT scope for the defaults below: Linodes: R/W + Firewalls: R/W +
# Placement Groups: R/W.
provider_config:
  region: us-ord
  type: g6-nanode-1
  image: linode/debian13
  token: <linode-pat>

  # Managed Cloud Firewall: one per deployment, default-deny inbound except
  # tcp/22 from the orchestrator's external IP (auto). Reaped on last
  # Destroy. README covers sentinels (auto/any/any-v4/any-v6), policy
  # overrides (inbound_policy / outbound_policy), and operator extra
  # rules (extra_inbound / extra_outbound).
  firewall:
    allow_inbound:
      - auto
  # Alternative: attach to a pre-existing firewall (operator-managed).
  # Mutually exclusive with `firewall:` above. Only needs Linodes: R/W.
  # firewall_id: 123456

  # Managed Placement Group (anti-affinity:local) — spreads workers across
  # distinct hosts within `region`. Reaped on last Destroy. README covers
  # the strict/flexible enforcement knob (flexible by default lets Linode
  # fall back to colocation when the anti-affinity slot isn't available).
  placement_group:
    enforcement: flexible
  # Alternative: attach to a pre-existing PG (operator-managed). Mutually
  # exclusive with `placement_group:` above. Only needs Linodes: R/W.
  # placement_group_id: 67890

  # Managed VPC. Workers gain a VPC NIC on the worker subnet in addition to
  # their public NIC. Useful by itself for worker-to-worker private comms;
  # a future feature (pull-through cache, FJB-6) attaches the cache VM to a
  # second subnet on this same VPC and binds its registry to the VPC IP.
  # Reaped on last Destroy. Adds VPCs: R/W to the PAT scope.
  # vpc:
  #   # Subnet CIDRs must be RFC1918 (10/8, 172.16/12, 192.168/16); Linode
  #   # rejects CGNAT and public ranges. CIDRs don't escape the VPC, so any
  #   # vacant RFC1918 range is fine — pick one that doesn't overlap your
  #   # LAN if you ever VPN/peer.
  #   subnets:
  #     cache:
  #       ipv4: 10.0.0.0/24
  #   # Optional: pick which subnet workers attach to. Defaults to the
  #   # alphabetically-first key in subnets (so single-subnet configs need
  #   # no override).
  #   # worker_subnet: cache

  # Managed scratch registry (FJB-13). ABSENT = no cache. PRESENT =
  # one zot VM + one Object Storage bucket per deployment, plus a
  # multipart-MIME wrap on each worker's cloud-init that ships the
  # fjb-managed CA + an /etc/hosts entry mapping cache.fjb.internal
  # to the cache's VPC IP. Workers can then
  #   docker push/pull cache.fjb.internal:5000/foo/bar:t
  # for intermediate build artifacts that don't need to round-trip to
  # the canonical registry. Pushes to the canonical registry
  # (forgejo.url etc.) go direct from the worker — nothing intercepts
  # them. Auto-synthesizes the `vpc:` block above if not declared.
  # Adds `Object Storage: R/W` to the PAT scope and requires Object
  # Storage to be enabled on the Linode account ($5/mo flat, one-
  # click at Cloud Manager → Object Storage).
  # cache:
  #   # CA persistence path. Adopt-existing on daemon restart requires
  #   # the CA dir to survive between restarts. Default under
  #   # os.UserConfigDir(); set to a stable path when running fjb as a
  #   # system service.
  #   # tls:
  #   #   ca_dir: /var/lib/fj-bellows/example/cache-ca
  #   # type: g6-nanode-1          # bump to g6-standard-1 under burst
  #   # image: linode/debian13
  #   # zot_version: 2.1.7         # pinned; bump deliberately

poll:
  # How often to reconcile the queue against runners and instances.
  interval: 10s
  # Hourly-rounding providers (Linode): kill an idle node this long before
  # each paid-hour boundary (5m → the :55 rule).
  hour_margin: 5m
  # Per-second billing providers (Docker etc.): tear down an idle node
  # after this long.
  idle_timeout: 5m
  # Cycle length for the kill mark; defaults to 1h matching every cloud's
  # hourly rounding. Shorten for faster idle reclamation (e2e uses seconds).
  # billing_hour: 1h

ssh:
  # The orchestrator dispatches one-job to workers over SSH using this key.
  # Its public half is injected into each VM at provision time.
  private_key_file: /etc/fj-bellows/id_ed25519
  user: root
  port: 22

# Transport mode for orchestrator ↔ worker dispatch.
#
#   "ssh" (default):    legacy SSH-on-public-IP. Each worker has a public
#                       IPv4 with TCP/22 open to the orchestrator; the
#                       dispatch session carries a reverse port-forward
#                       to a LAN-only Forgejo.
#
#   "cache-gateway":    (FJB-54) cache nanode terminates an IPsec tunnel
#                       from the LAN side and runs DNS + routing for the
#                       worker VPC. Workers reach LAN services by name
#                       through the cache; no public inbound on workers.
#                       Set tunnel.routes + tunnel.lan_egress below.
#
# Leave this block out entirely to default to "ssh".
#
# transport:
#   mode: cache-gateway
#   tunnel:
#     # LAN-side CIDRs reachable from workers via the IPsec tunnel.
#     # Worker cloud-init adds an explicit route for each via the cache's
#     # VPC IP. Everything not in the list takes the worker's default
#     # gateway (provider NAT egress).
#     routes:
#       - 192.168.0.0/24
#
#     # Outbound allow-list — traffic permitted to emerge from the
#     # tunnel onto the LAN. Enforced at two points (cache iptables and
#     # LAN-side outbound firewall) from this single source. Anything not
#     # listed is denied. `from: worker-vpc` resolves to the worker VPC
#     # subnet via the active provider.
#     lan_egress:
#       - { from: worker-vpc, to: 192.168.0.2, port: 53,  proto: udp } # LAN DNS
#       - { from: worker-vpc, to: 192.168.0.2, port: 53,  proto: tcp } # LAN DNS (TCP)
#       - { from: worker-vpc, to: 192.168.0.7, port: 443, proto: tcp } # Forgejo
#       - { from: worker-vpc, to: 192.168.0.7, port: 22,  proto: tcp } # git-over-ssh
