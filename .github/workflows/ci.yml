name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # `build-image` + `publish` push to ghcr; declared at workflow level so
  # both jobs inherit. test/lint/e2e jobs only read (and don't need this).
  packages: write

jobs:
  # Single Docker build pipeline: runs the Dockerfile's `test` stage
  # (go vet + go test -race + govulncheck on the source the runtime
  # binary will be built from), then builds and pushes the multi-arch
  # runtime image to a run-scoped temp tag on ghcr.io. Both buildx
  # invocations share the `type=gha` cache, so the `source` stage is
  # built once and reused.
  #
  # If tests fail, the image is never pushed → e2e-docker / e2e-linode
  # / publish (which all consume this image) never run. The "publish
  # what we tested" property is enforced by the build pipeline itself,
  # not by job-level dependencies.
  #
  # `lint` stays independent (parallel; gates publish only). See #49.
  build-image:
    name: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image: ${{ steps.refs.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image refs
        id: refs
        run: |
          # Lower-cased repo because Docker refs must be lowercase but
          # GH allows mixed-case repository names.
          owner_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_repo}:ci-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      # Test stage runs on the build platform (single arch) so go test
      # -race executes natively, not under qemu. Cache shared with the
      # runtime build below means the `source` stage layers carry over.
      - name: Test (Dockerfile `test` stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push multi-arch runtime
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.refs.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1

  # End-to-end docker E2E: build the worker image, bring up Forgejo, seed it,
  # launch fj-bellows, and assert it polls the live job queue without decode
  # errors and provisions a worker container. Adding this to branch-protection
  # required checks is intentionally out of scope for this PR.
  e2e-docker:
    name: e2e-docker
    needs: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Pinned Forgejo tag for reproducibility. The install lock is set so the
      # container starts already installed (skipping the web wizard). Action
      # runs are enabled so workflow files trigger queued jobs.
      forgejo:
        image: codeberg.org/forgejo/forgejo:15
        ports:
          - 3000:3000
        env:
          FORGEJO__security__INSTALL_LOCK: "true"
          FORGEJO__server__ROOT_URL: "http://localhost:3000/"
          FORGEJO__server__HTTP_PORT: "3000"
          FORGEJO__server__DOMAIN: "localhost"
          FORGEJO__actions__ENABLED: "true"
    env:
      FORGEJO_URL: http://localhost:3000
      FORGEJO_ADMIN_USER: bellows
      FORGEJO_ADMIN_PASS: adminpass1
      FORGEJO_ADMIN_EMAIL: admin@example.com
      FORGEJO_ORG: bellowsorg
      FORGEJO_REPO: demo
      FORGEJO_LABEL: docker
      FJBELLOWS_TAG: fjb-integ-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull the canonical image that build-image just pushed, and extract
      # its binary onto the runner so the orchestrator runs as a host
      # process (matches how it ran when this job built its own binary;
      # the e2e harness reads the orchestrator's log + writes a lockfile
      # on the runner's filesystem). Containerising the orchestrator here
      # would add bind-mounts for state without exercising anything the
      # binary doesn't already exercise.
      - name: Pull built image and extract daemon binary
        run: |
          set -euo pipefail
          image='${{ needs.build-image.outputs.image }}'
          echo "consuming image: $image"
          docker pull "$image"
          cid=$(docker create "$image")
          docker cp "$cid:/usr/local/bin/fj-bellows" ./fj-bellows
          docker rm "$cid" >/dev/null
          chmod +x ./fj-bellows

      - name: Build worker image
        run: docker build -t fj-bellows-worker:test test/e2e-docker/worker

      - name: Identify Forgejo service container
        id: forgejo
        # Find the service-container ID/name/network. We need:
        #   - the container name, to run `forgejo admin user create` via exec
        #   - the container's IP on the runner's docker network, because the
        #     worker containers we launch via `docker run` cannot reach the
        #     Forgejo service via the host port — they must address it on the
        #     bridge network the GitHub Actions runner sets up for services.
        # The service container's name is auto-generated; we filter for the
        # image we pinned above to avoid hardcoding it.
        run: |
          set -euo pipefail
          cid=$(docker ps --filter ancestor=codeberg.org/forgejo/forgejo:15 -q | head -n1)
          if [ -z "$cid" ]; then
            echo "ERROR: forgejo service container not found"; docker ps -a; exit 1
          fi
          cname=$(docker inspect -f '{{.Name}}' "$cid" | sed 's|^/||')
          # The service container is attached to a docker network shared with
          # the job container; find it (skip "bridge"/"host"/"none").
          net=$(docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' "$cid" | tr ' ' '\n' | grep -vE '^(bridge|host|none|)$' | head -n1)
          if [ -z "$net" ]; then net=bridge; fi
          # Pick the container IP on that network.
          ip=$(docker inspect -f "{{(index .NetworkSettings.Networks \"$net\").IPAddress}}" "$cid")
          echo "Forgejo container: $cname (net=$net ip=$ip)"
          echo "name=$cname" >> "$GITHUB_OUTPUT"
          echo "network=$net" >> "$GITHUB_OUTPUT"
          echo "internal_url=http://$ip:3000" >> "$GITHUB_OUTPUT"

      - name: Seed Forgejo
        id: seed
        env:
          FORGEJO_CONTAINER: ${{ steps.forgejo.outputs.name }}
        run: |
          set -euo pipefail
          chmod +x test/e2e-docker/seed.sh
          token=$(bash test/e2e-docker/seed.sh)
          # Token is opaque; mask it so it does not leak via the log.
          echo "::add-mask::$token"
          # Pass via env file rather than step output so it stays masked.
          echo "FORGEJO_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Write fj-bellows config
        run: |
          set -euo pipefail
          umask 077
          cat > config.yaml <<YAML
          forgejo:
            url: ${{ steps.forgejo.outputs.internal_url }}
            token: ${FORGEJO_TOKEN}
            scope: orgs/${FORGEJO_ORG}
            labels:
              - ${FORGEJO_LABEL}
          tag: ${FJBELLOWS_TAG}
          scale:
            max: 1
          provider: docker
          provider_config:
            image: fj-bellows-worker:test
            network: ${{ steps.forgejo.outputs.network }}
            # Bind-mount the host Docker socket so forgejo-runner inside the
            # worker can spawn per-step containers on the host daemon (no
            # nested Docker required).
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock
          poll:
            interval: 2s
            idle_timeout: 5s
            hour_margin: 5m
          YAML
          chmod 600 config.yaml

      - name: Launch fj-bellows
        run: |
          set -euo pipefail
          ./fj-bellows \
            -config "$PWD/config.yaml" \
            -lock "$PWD/fj-bellows.lock" \
            -drain=false \
            -destroy-on-exit \
            > fj-bellows.stdout 2> fj-bellows.log &
          echo $! > fj-bellows.pid
          # Give the orchestrator a moment to tick through one full reconcile.
          sleep 2

      - name: Assert
        env:
          FJBELLOWS_LOG: fj-bellows.log
          PROVISION_WAIT: "60"
        run: |
          chmod +x test/e2e-docker/assert.sh
          bash test/e2e-docker/assert.sh

      - name: Capture diagnostics on failure
        if: failure()
        run: |
          echo "===== fj-bellows.log ====="; cat fj-bellows.log || true
          echo "===== fj-bellows.stdout ====="; cat fj-bellows.stdout || true
          echo "===== Forgejo container log ====="
          docker logs "${{ steps.forgejo.outputs.name }}" 2>&1 | tail -200 || true
          echo "===== worker containers ====="
          docker ps -a --filter "label=fj-bellows.tag=${FJBELLOWS_TAG}" || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-docker-logs
          path: |
            fj-bellows.log
            fj-bellows.stdout
            config.yaml
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          set +e
          if [ -f fj-bellows.pid ]; then
            kill "$(cat fj-bellows.pid)" 2>/dev/null
            sleep 2
            kill -9 "$(cat fj-bellows.pid)" 2>/dev/null
          fi
          # Remove any worker containers stamped with our run tag.
          docker ps -a --filter "label=fj-bellows.tag=${FJBELLOWS_TAG}" -q | xargs -r docker rm -f

  # Gate the Linode E2E job on the LINODE_E2E_TOKEN secret existing. The
  # secret value is never exposed — only a boolean output is emitted.
  check-linode-secret:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.LINODE_E2E_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-linode:
    # Runs on push to main, tag pushes, and workflow_dispatch whenever
    # LINODE_E2E_TOKEN is configured; without the secret the job skips entirely.
    # Pull-request events are skipped to avoid spending ~1¢ per PR push on a
    # real-money job. A job-level `if:` skip reports as success, so this job
    # may remain in the branch-protection required-checks list.
    # Cost per real run: ~1¢ (one paid hour on a g6-nanode-1).
    #
    # Serialize: only one e2e-linode runs at a time across the whole repo,
    # others queue. The pre-flight cleanup below prefix-matches every
    # `fj-bellows-e2e-ci-*` tag, so two concurrent runs would race —
    # whichever pre-flight fires second wipes the other's just-provisioned
    # Linode mid-job (we hit exactly this when a v* tag push fires seconds
    # after the merge-to-main push and the second run's pre-flight destroyed
    # the first's Linode). cancel-in-progress: false queues rather than
    # killing the older run.
    concurrency:
      group: e2e-linode-${{ github.repository }}
      cancel-in-progress: false
    needs: [check-linode-secret, build-image]
    if: github.event_name != 'pull_request' && needs.check-linode-secret.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      forgejo:
        image: codeberg.org/forgejo/forgejo:15
        env:
          FORGEJO__security__INSTALL_LOCK: "true"
          FORGEJO__server__ROOT_URL: http://localhost:3000/
          FORGEJO__database__DB_TYPE: sqlite3
          FORGEJO__database__PATH: /tmp/forgejo.db
          FORGEJO__actions__ENABLED: "true"
        ports:
          - 3000:3000
    env:
      LINODE_TOKEN: ${{ secrets.LINODE_E2E_TOKEN }}
      FORGEJO_URL: http://localhost:3000
      FORGEJO_ADMIN_USER: e2eadmin
      FORGEJO_ADMIN_PASS: e2e-CI-Pass-1!
      FORGEJO_ADMIN_EMAIL: e2e@example.com
      FORGEJO_ORG: e2eorg
      FORGEJO_REPO: e2erepo
      FORGEJO_LABEL: linode-e2e
      FORGEJO_WORKFLOW_CONTAINER_OPTS: --network host
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same image-consumption pattern as e2e-docker: pull the canonical
      # build-image artifact, extract the daemon binary, run it on the
      # runner. See #49.
      - name: Pull built image and extract daemon binary
        run: |
          set -euo pipefail
          image='${{ needs.build-image.outputs.image }}'
          echo "consuming image: $image"
          docker pull "$image"
          cid=$(docker create "$image")
          docker cp "$cid:/usr/local/bin/fj-bellows" ./fj-bellows
          docker rm "$cid" >/dev/null
          chmod +x ./fj-bellows

      - name: Resolve Forgejo service container name (for `forgejo admin user create`)
        id: forgejo
        run: |
          set -euo pipefail
          cid=$(docker ps --filter ancestor=codeberg.org/forgejo/forgejo:15 -q | head -n1)
          if [ -z "$cid" ]; then
            echo "ERROR: forgejo service container not found"
            docker ps -a
            exit 1
          fi
          echo "name=$cid" >> "$GITHUB_OUTPUT"

      - name: Pre-flight cleanup of leaked Linodes + firewalls (fj-bellows-e2e-ci-*)
        run: |
          set -euo pipefail
          ids=$(curl -sS -H "Authorization: Bearer $LINODE_TOKEN" \
                  'https://api.linode.com/v4/linode/instances?page_size=200' \
                | jq -r '.data[]? | select(.tags|any(startswith("fj-bellows-e2e-ci-"))) | .id')
          for id in $ids; do
            echo "destroying leaked Linode $id"
            curl -sS -o /dev/null -X DELETE -H "Authorization: Bearer $LINODE_TOKEN" \
              "https://api.linode.com/v4/linode/instances/$id"
          done
          # Same prefix sweep for managed firewalls (#26). A firewall with
          # devices still attached can't be deleted; the loop above removed
          # the devices first.
          fwids=$(curl -sS -H "Authorization: Bearer $LINODE_TOKEN" \
                    'https://api.linode.com/v4/networking/firewalls?page_size=200' \
                  | jq -r '.data[]? | select(.tags|any(startswith("fj-bellows-e2e-ci-"))) | .id')
          for id in $fwids; do
            echo "destroying leaked firewall $id"
            curl -sS -o /dev/null -X DELETE -H "Authorization: Bearer $LINODE_TOKEN" \
              "https://api.linode.com/v4/networking/firewalls/$id"
          done

      - name: Generate ephemeral SSH keypair
        run: |
          ssh-keygen -t ed25519 -N '' -f "$RUNNER_TEMP/id_ed25519" -C 'fj-bellows-e2e-ci' -q

      - name: Seed Forgejo
        env:
          FORGEJO_CONTAINER: ${{ steps.forgejo.outputs.name }}
        run: |
          set -euo pipefail
          chmod +x test/e2e-docker/seed.sh
          token=$(bash test/e2e-docker/seed.sh)
          echo "::add-mask::$token"
          echo "FORGEJO_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Write fj-bellows config
        env:
          TAG: fj-bellows-e2e-ci-${{ github.run_id }}
        run: |
          set -euo pipefail
          umask 077
          cat > config.yaml <<YAML
          forgejo:
            url: http://localhost:3000
            token: ${FORGEJO_TOKEN}
            scope: orgs/${FORGEJO_ORG}
            labels: [${FORGEJO_LABEL}]
          tag: ${TAG}
          scale:
            max: 1
          provider: linode
          provider_config:
            region: us-ord
            type: g6-nanode-1
            image: linode/debian13
            token: ${LINODE_TOKEN}
            # Managed firewall: SSH only from this CI runner's external IP.
            # `auto` resolves to the GH-hosted runner's egress, which is the
            # one address that needs to reach the worker for dispatch. The
            # PAT `LINODE_E2E_TOKEN` needs `Firewalls: R/W` in addition to
            # `Linodes: R/W`. See #26.
            firewall:
              allow_inbound:
                - auto
          ssh:
            private_key_file: $RUNNER_TEMP/id_ed25519
            user: root
            port: 22
          poll:
            interval: 5s
            idle_timeout: 30s
            # Force a short billing cycle so idle teardown fires inside the
            # CI budget. Linode still bills a whole hour on its side; we're
            # just choosing to close earlier (sacrificing the
            # fill-the-paid-hour benefit) so the E2E can actually observe a
            # teardown. With billing_hour=60s + hour_margin=10s the kill
            # mark is created+50s of every minute (then +1m50s, etc.).
            billing_hour: 60s
            hour_margin: 10s
          YAML
          chmod 600 config.yaml
          # Mask LINODE_TOKEN so even if a future step accidentally prints
          # the rendered config, the token does not leak via the run log.
          echo "::add-mask::${LINODE_TOKEN}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Launch fj-bellows
        run: |
          set -euo pipefail
          ./fj-bellows \
            -config "$PWD/config.yaml" \
            -lock "$PWD/fj-bellows.lock" \
            -drain=false \
            -destroy-on-exit \
            > fj-bellows.stdout 2> fj-bellows.log &
          echo $! > fj-bellows.pid
          sleep 2

      - name: Wait for the Linode to appear in the API
        id: linode
        run: |
          set -euo pipefail
          for i in $(seq 1 180); do
            body=$(curl -sS -H "Authorization: Bearer $LINODE_TOKEN" \
                     'https://api.linode.com/v4/linode/instances?page_size=200')
            ip=$(printf '%s' "$body" | jq -r --arg t "$TAG" \
                  '.data[]? | select(.tags|index($t)) | .ipv4[0]' | head -n1)
            if [ -n "$ip" ] && [ "$ip" != "null" ]; then
              echo "Linode IP $ip after ${i}*2s"
              echo "ip=$ip" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Linode did not appear within ~6 min"
          exit 1

      - name: Wait for SSH on the Linode
        env:
          LIP: ${{ steps.linode.outputs.ip }}
        run: |
          set -euo pipefail
          for i in $(seq 1 180); do
            if ssh -i "$RUNNER_TEMP/id_ed25519" -o StrictHostKeyChecking=accept-new \
                   -o UserKnownHostsFile="$RUNNER_TEMP/known_hosts" \
                   -o ConnectTimeout=3 root@"$LIP" 'true' 2>/dev/null; then
              echo "SSH ready after ${i}*2s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: SSH never came up on $LIP"
          exit 1

      # The dispatcher now opens a reverse port-forward over the dispatch SSH
      # session (internal/orchestrator/dispatch.go), so workers reach Forgejo
      # via the orchestrator's view of it. No side-car tunnel needed; see #33.

      - name: Wait for 'job complete' in orchestrator log
        run: |
          set -euo pipefail
          for i in $(seq 1 180); do
            if grep -q 'job complete' fj-bellows.log; then
              echo "'job complete' after ${i}*2s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: job did not complete; last 50 lines of orchestrator log:"
          tail -50 fj-bellows.log
          exit 1

      # Idle teardown assertion. Now that billing_hour is configurable, the
      # config above uses a 60s cycle with a 10s margin, so the orchestrator
      # destroys an idle worker within ~50s of every cycle boundary. We give
      # it ~120s after "job complete" to fire — comfortably above one cycle.
      # Linode still bills the whole hour on its side; the cleanup step plus
      # `-destroy-on-exit` reclaim the VM regardless.
      - name: Wait for idle teardown in orchestrator log
        env:
          LIP: ${{ steps.linode.outputs.ip }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if grep -q 'destroyed idle node' fj-bellows.log; then
              echo "idle teardown observed after ${i}*2s"
              # Confirm the Linode is actually gone from the provider's view.
              body=$(curl -sS -H "Authorization: Bearer $LINODE_TOKEN" \
                       'https://api.linode.com/v4/linode/instances?page_size=200')
              still=$(printf '%s' "$body" | jq -r --arg t "$TAG" \
                      '[.data[]? | select(.tags|index($t))] | length')
              if [ "$still" = "0" ]; then
                echo "Linode with tag $TAG is gone from the API"
                exit 0
              fi
              # The Linode DELETE may lag a few seconds behind the log line.
              echo "log says destroyed but $still Linode(s) still listed; retrying"
            fi
            sleep 2
          done
          echo "ERROR: idle teardown did not fire within ~120s; last 50 lines:"
          tail -50 fj-bellows.log
          exit 1

      - name: Cleanup (always runs)
        if: always()
        env:
          LIP: ${{ steps.linode.outputs.ip || '' }}
        run: |
          set +e
          # Stop fj-bellows.
          if [ -s fj-bellows.pid ]; then
            kill "$(cat fj-bellows.pid)" 2>/dev/null
          fi
          # Destroy any Linode + managed firewall left carrying our run tag.
          # Order matters: a firewall with devices still attached can't be
          # deleted, so destroy instances first, then the firewall.
          if [ -n "${LINODE_TOKEN:-}" ] && [ -n "${TAG:-}" ]; then
            ids=$(curl -sS -H "Authorization: Bearer $LINODE_TOKEN" \
                    'https://api.linode.com/v4/linode/instances?page_size=200' \
                  | jq -r --arg t "$TAG" '.data[]? | select(.tags|index($t)) | .id')
            for id in $ids; do
              echo "post-flight: destroying Linode $id"
              curl -sS -o /dev/null -X DELETE -H "Authorization: Bearer $LINODE_TOKEN" \
                "https://api.linode.com/v4/linode/instances/$id"
            done
            fwids=$(curl -sS -H "Authorization: Bearer $LINODE_TOKEN" \
                      'https://api.linode.com/v4/networking/firewalls?page_size=200' \
                    | jq -r --arg t "$TAG" '.data[]? | select(.tags|index($t)) | .id')
            for id in $fwids; do
              echo "post-flight: destroying managed firewall $id"
              curl -sS -o /dev/null -X DELETE -H "Authorization: Bearer $LINODE_TOKEN" \
                "https://api.linode.com/v4/networking/firewalls/$id"
            done
          fi

      - name: Upload orchestrator log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fj-bellows-log
          path: fj-bellows.log
          if-no-files-found: ignore

  # Gate publishing on the DockerHub secrets existing, so publish skips cleanly
  # (no failed run) until they are configured. Only a boolean is emitted; the
  # secret values are never exposed.
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      dockerhub: ${{ steps.check.outputs.dockerhub }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    # Only publish after test AND lint pass, and never for pull requests. This
    # gates both main pushes and v* tags behind green CI. ghcr.io publishes
    # unconditionally (only needs GITHUB_TOKEN); Docker Hub is added when its
    # secrets are configured.
    # Block publish if either e2e job FAILED, but allow it through when an
    # e2e job was skipped (e.g. e2e-linode skips when LINODE_E2E_TOKEN is
    # unset; e2e-docker runs unconditionally, but the || skipped clause is
    # harmless and defensive). This ensures a broken-on-Linode or
    # broken-on-Docker build does not get published, without making publish
    # depend on the Linode secret being configured.
    needs: [lint, check-secrets, build-image, e2e-linode, e2e-docker]
    if: |
      github.event_name != 'pull_request' &&
      (needs.e2e-linode.result == 'success' || needs.e2e-linode.result == 'skipped') &&
      (needs.e2e-docker.result == 'success' || needs.e2e-docker.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full tag history so the "highest semver" step below can
          # compare the pushed ref against every prior release tag.
          fetch-depth: 0

      # Guard the floating `{{major}}` and `{{major}}.{{minor}}` tags against
      # backport pushes. A later v0.1.5 published after v0.2.0 would otherwise
      # silently move `:0` and `:0.1` back to v0.1.5. We only emit the floating
      # tags when the pushed tag is the highest semver in the repo; backport
      # publishes still get `:0.1.5` + `:<sha>` but leave the floating tags
      # pinned at the true latest. Branch pushes (no tag) just see yes=false,
      # which doesn't matter — the semver patterns wouldn't emit anyway.
      - name: Is this the highest semver tag?
        id: highest
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v*' | sort -V | tail -n1)
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" = "$latest" ]; then
            echo "yes=true" >> "$GITHUB_OUTPUT"
          else
            echo "yes=false" >> "$GITHUB_OUTPUT"
          fi

      # buildx is required for `imagetools create`; qemu is not (we're not
      # building, just rewriting the manifest in the registry).
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: needs.check-secrets.outputs.dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io image is always published; the Docker Hub image is appended
          # only when its secrets exist (empty lines are ignored). Image names
          # come from contexts/secrets, so no account name is committed.
          images: |
            ghcr.io/${{ github.repository }}
            ${{ needs.check-secrets.outputs.dockerhub == 'true' && format('docker.io/{0}/fj-bellows', secrets.DOCKERHUB_USERNAME) || '' }}
          # Disable the default `latest=auto` (which would stamp `:latest` on
          # the highest semver tag push). We want a single source for `:latest`:
          # main HEAD — declared explicitly in the tags list below.
          flavor: |
            latest=false
          # `:latest` follows main HEAD — explicitly gated to main pushes so
          # tag pushes don't also stamp `:latest` (we don't want a backport
          # release to move `:latest` backward, same concern as `:0`).
          # `{{major}}` and `{{major}}.{{minor}}` are gated on being the highest
          # semver; see the `highest` step above.
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.highest.outputs.yes == 'true' }}
            type=semver,pattern={{major}},enable=${{ steps.highest.outputs.yes == 'true' }}
            type=sha

      # Retag the multi-arch artifact build-image already produced. No
      # rebuild — the bytes we publish here are the same bytes e2e-docker
      # and e2e-linode just validated. See #49.
      #
      # docker buildx imagetools create rewrites the registry manifest to
      # add new tag refs pointing at the same digest, preserving the
      # multi-arch (amd64 + arm64) manifest list as-is.
      - name: Retag build-image with release tags
        env:
          SRC: ${{ needs.build-image.outputs.image }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            args+=(--tag "$tag")
          done <<< "$TAGS"
          echo "retagging $SRC →"
          printf '  %s\n' "${args[@]}"
          docker buildx imagetools create "${args[@]}" "$SRC"
